name: Deploy Lantern Quiz
on:
  push:
    branches: [ main ] # 當你 push 到 main 分支時觸發

permissions:
  contents: write # 賦予機器人寫入權限，解決 403 錯誤

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API Key
        run: |
          # 這行會把 index.html 裡的佔位符替換成你設定的 Secret LANTERN
          sed -i "s/__GEMINI_API_KEY__/${{ secrets.LANTERN }}/g" index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .        # 部署根目錄下的所有檔案
          branch: gh-pages # 部署到 gh-pages 分支
