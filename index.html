<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏮 AI 智能燈謎大會 🏮</title>
    <style>
        :root { --red: #d32f2f; --gold: #ffd700; }
        body { background: #0e0e0e; color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        
        /* 4x3 矩陣 */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }

        .lantern {
            background: radial-gradient(circle, #ff5252, var(--red));
            aspect-ratio: 1/1.2;
            border: 2px solid var(--gold);
            border-radius: 50% 50% 40% 40%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: 0.3s;
            position: relative;
            box-shadow: 0 4px 10px rgba(255,0,0,0.3);
        }

        .lantern:hover { transform: scale(1.08); box-shadow: 0 0 20px var(--gold); }
        .lantern::after { content: "🧧"; position: absolute; bottom: -10px; }

        /* Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;
        }
        .card {
            background: white; color: #333; padding: 30px; border-radius: 20px;
            width: 80%; max-width: 400px; border: 4px solid var(--gold);
        }

        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-check { background: var(--red); color: white; margin-bottom: 5px; }
        
        #fireworks { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 2000; }
    </style>
</head>
<body>

<canvas id="fireworks"></canvas>

<header>
    <h1 style="color:var(--gold);">🏮 2026 智慧燈謎會 🏮</h1>
    <div id="key-section" style="font-size: 0.8rem; opacity: 0.6;">
        <input type="password" id="api-key" placeholder="若 API 未生效，請輸入 Key" style="width:200px">
    </div>
</header>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
    <div class="card">
        <h2 id="q-text">題目</h2>
        <p id="q-hint" style="color:var(--red)"></p>
        <input type="text" id="ans-input" placeholder="請輸入答案...">
        <div id="ai-res" style="margin: 10px 0; font-weight: bold;"></div>
        <div style="display:flex; flex-direction:column; gap:8px;">
            <button class="btn-check" onclick="verify()">AI 判定</button>
            <button id="hint-btn" style="background:#f39c12; color:white; display:none;" onclick="getAiHint()">AI 給個線索</button>
            <button onclick="closeModal()">取消</button>
        </div>
    </div>
</div>

<script>
    const BUILT_IN_KEY = "__GEMINI_API_KEY__"; 
    const riddles = [
        {q:"一隻黑狗，不叫不吼", a:"默", h:"猜一字"},
        {q:"山上還有山", a:"出", h:"猜一字"},
        {q:"十張口，一顆心", a:"思", h:"猜一字"},
        {q:"一來再來", a:"冉", h:"猜一字"},
        {q:"九隻鳥", a:"鳩", h:"猜一字"},
        {q:"一點一橫長，一撇到南洋", a:"府", h:"猜一字"},
        {q:"白糖梅子真稀奇", a:"元宵", h:"猜食物"},
        {q:"身穿綠衣裳，肚裡紅瓤子", a:"西瓜", h:"猜水果"},
        {q:"有頭沒有頸，有眼沒有眉", a:"魚", h:"猜生物"},
        {q:"三個人看太陽", a:"春", h:"猜一字"},
        {q:"左邊水，右邊火", a:"淡", h:"猜一字"},
        {q:"小小一間房，只有一扇窗", a:"相機", h:"猜物品"}
    ];

    let current = null;

    // 渲染 4x3 燈籠
    const grid = document.getElementById('grid');
    riddles.forEach((r, i) => {
        const div = document.createElement('div');
        div.className = 'lantern';
        div.innerText = r.q.substring(0,4);
        div.onclick = () => {
            current = r;
            document.getElementById('q-text').innerText = r.q;
            document.getElementById('q-hint').innerText = "類別：" + r.h;
            document.getElementById('ai-res').innerText = "";
            document.getElementById('ans-input').value = "";
            document.getElementById('hint-btn').style.display = 'none';
            document.getElementById('modal').style.display = 'flex';
        };
        grid.appendChild(div);
    });

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    async function callGemini(prompt) {
        const key = (BUILT_IN_KEY && !BUILT_IN_KEY.startsWith("__")) ? BUILT_IN_KEY : document.getElementById('api-key').value;
        if(!key) { alert("請輸入 API Key！"); return null; }
        
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${key}`;
        const res = await fetch(url, {
            method: 'POST',
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const data = await res.json();
        return data.candidates[0].content.parts[0].text;
    }

    async function verify() {
        const userAns = document.getElementById('ans-input').value;
        const resDiv = document.getElementById('ai-res');
        resDiv.innerText = "AI 判定中...";
        
        const prompt = `燈謎題目：${current.q}，正確答案：${current.a}。使用者回答：${userAns}。請只回傳「YES」或「NO」，並附帶一句鼓勵或恭喜的話。`;
        const result = await callGemini(prompt);
        
        if(result.includes("YES")) {
            resDiv.innerHTML = "🎉 " + result.replace("YES", "");
            launchFireworks();
        } else {
            resDiv.innerHTML = "❌ " + result.replace("NO", "");
            document.getElementById('hint-btn').style.display = 'block';
        }
    }

    async function getAiHint() {
        const resDiv = document.getElementById('ai-res');
        resDiv.innerText = "AI 思考提示中...";
        const prompt = `燈謎：${current.q}，答案：${current.a}。請給一個不直接說出答案的隱晦提示。`;
        resDiv.innerText = "💡 " + await callGemini(prompt);
    }

    // 簡易煙火
    function launchFireworks() {
        const cvs = document.getElementById('fireworks');
        const ctx = cvs.getContext('2d');
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        let p = [];
        for(let i=0; i<100; i++) p.push({
            x: cvs.width/2, y: cvs.height/2, 
            vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
            c: `hsl(${Math.random()*360}, 100%, 50%)`, l: 100
        });
        function draw() {
            ctx.clearRect(0,0,cvs.width,cvs.height);
            p.forEach(i => {
                i.x+=i.vx; i.y+=i.vy; i.l--;
                ctx.fillStyle = i.c;
                ctx.globalAlpha = i.l/100;
                ctx.fillRect(i.x, i.y, 4, 4);
            });
            p = p.filter(i => i.l > 0);
            if(p.length > 0) requestAnimationFrame(draw);
        }
        draw();
    }
</script>
</body>
</html>
