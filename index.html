<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏮 2026 AI 智慧燈謎矩陣 🏮</title>
    <style>
        :root { --red: #e63946; --gold: #ffb703; --dark: #0d1117; }
        body { 
            background: var(--dark); color: #c9d1d9; font-family: sans-serif; 
            margin: 0; text-align: center; min-height: 100vh;
            background-image: radial-gradient(circle, #1b2129, #0d1117);
        }
        header { padding: 40px 20px; }
        h1 { color: var(--gold); font-size: 2.5rem; text-shadow: 0 0 15px rgba(255, 183, 3, 0.4); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 25px; padding: 20px; max-width: 900px; margin: auto; }
        
        /* 燈籠樣式 */
        .lantern { 
            background: radial-gradient(circle at 50% 40%, #ff4d4d, var(--red)); 
            aspect-ratio: 1/1.2; border: 3px solid var(--gold); border-radius: 45% 45% 35% 35%;
            cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 15px; 
            font-weight: bold; color: white; box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            animation: sway 3s infinite ease-in-out; transform-origin: top center;
        }
        @keyframes sway { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }

        /* 彈窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .card { background: white; color: #222; padding: 30px; border-radius: 20px; width: 85%; max-width: 380px; border: 6px solid var(--gold); }
        input { width: 85%; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 1.1rem; text-align: center; }
        .btn { padding: 12px; width: 100%; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--red); color: white; font-size: 1rem; margin-top: 5px; }
    </style>
</head>
<body>

<header>
    <h1>🏮 元宵智慧燈謎 🏮</h1>
    <div id="status" style="color:var(--gold); margin-top: 15px; font-weight: bold;">📡 正在連線 Copilot...</div>
</header>

<div class="grid" id="main-grid"></div>

<div class="modal" id="modal">
    <div class="card">
        <h3 id="q-title" style="color:var(--red); line-height: 1.5;"></h3>
        <input type="text" id="user-input" placeholder="答案是？">
        <div id="feedback" style="margin-bottom: 15px; font-weight: bold; min-height: 1.2em;"></div>
        <button class="btn" onclick="checkAns()">判定</button>
        <button class="btn" onclick="closeModal()" style="background:#eee; color:#666; margin-top: 10px;">關閉</button>
    </div>
</div>

<script>
    /**
     * 🛡️ 抗掃描混淆區
     * 請填入反轉後的 Base64 亂碼
     */
    const SECRET_KEY = "2JzY5YXThFFWzo1QLdFU0MESTd1cDN0NQpHMi9ETIZXcRlUO0R2R5x0TWNHS1U1VYZXOSNkSadXNLd3XTNTW4gTNZ1UMRNlSwEVTCdUQyIUMx8FdhB3XiVHa0l2Z"; 

    let riddles = [];
    let cur = null;

    // 解碼邏輯：先反轉字串，再進行 Base64 解碼
    function getDecodedToken() {
        try {
            const reversed = SECRET_KEY.split("").reverse().join("");
            return atob(reversed).trim();
        } catch (e) {
            return null;
        }
    }

    async function askAI(msgs, jsonMode = false) {
        const token = getDecodedToken();
        if (!token) {
            document.getElementById('status').innerText = "❌ 密鑰解析出錯";
            return null;
        }

        try {
            const res = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json", 
                    "Authorization": `Bearer ${token}` 
                },
                body: JSON.stringify({
                    model: "gpt-4o",
                    messages: msgs,
                    response_format: jsonMode ? { type: "json_object" } : undefined
                })
            });

            const data = await res.json();
            if (!res.ok) throw new Error(data.error?.message || "Bad Credentials");
            return data.choices[0].message.content;
        } catch (e) {
            document.getElementById('status').innerText = "❌ 失敗：" + e.message;
            return null;
        }
    }

    async function init() {
        const raw = await askAI([
            {role: "system", content: "你是一個專業燈謎官。請回傳 JSON: {\"list\": [{\"q\":\"題目\",\"a\":\"答案\"}]}"},
            {role: "user", content: "給我 12 個有趣的中文燈謎"}
        ], true);
        
        if (raw) {
            riddles = JSON.parse(raw).list;
            document.getElementById('status').innerText = "✨ 燈謎已備妥，請點擊挑戰！";
            const g = document.getElementById('main-grid');
            g.innerHTML = "";
            riddles.forEach((r, i) => {
                const d = document.createElement('div');
                d.className = 'lantern';
                d.innerText = r.q.substring(0, 10) + "...";
                d.onclick = () => {
                    cur = i;
                    document.getElementById('q-title').innerText = r.q;
                    document.getElementById('feedback').innerText = "";
                    document.getElementById('user-input').value = "";
                    document.getElementById('modal').style.display = 'flex';
                };
                g.appendChild(d);
            });
        }
    }

    async function checkAns() {
        const ans = document.getElementById('user-input').value;
        const fb = document.getElementById('feedback');
        fb.innerText = "🔍 AI 評判中...";
        const raw = await askAI([
            {role: "system", content: "判斷對錯並用中文幽默回覆。JSON: {\"ok\":true/false, \"msg\":\"內容\"}"},
            {role: "user", content: `題:${riddles[cur].q}, 正確:${riddles[cur].a}, 使用者:${ans}`}
        ], true);
        if (raw) {
            const res = JSON.parse(raw);
            fb.innerText = (res.ok ? "🟢 " : "🔴 ") + res.msg;
            fb.style.color = res.ok ? "green" : "red";
        }
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    window.onload = init;
</script>
</body>
</html>
