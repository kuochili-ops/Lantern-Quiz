<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏮 AI 智慧燈謎矩陣 - 2026 節慶版</title>
    <style>
        :root { --red: #d32f2f; --gold: #ffd700; --dark: #0a0a0a; }
        body { background: var(--dark); color: #fff; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; margin: 0; text-align: center; overflow-x: hidden; }
        
        header { padding: 30px 10px; }
        .status-msg { font-size: 0.9rem; color: var(--gold); margin-bottom: 10px; min-height: 1.2em; text-shadow: 0 0 5px rgba(255, 215, 0, 0.5); }

        /* 4x3 矩陣佈局 */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 15px;
            padding: 10px;
            max-width: 850px;
            margin: auto;
        }

        .lantern {
            background: radial-gradient(circle, #ff4d4d, var(--red));
            aspect-ratio: 1/1.2;
            border: 2px solid var(--gold);
            border-radius: 50% 50% 45% 45%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            font-size: 0.95rem;
            font-weight: bold;
            line-height: 1.4;
            transition: all 0.3s ease;
            position: relative;
            box-shadow: 0 5px 15px rgba(255,0,0,0.3);
            color: white;
            word-break: break-all;
        }

        .lantern:hover { transform: scale(1.08) translateY(-5px); box-shadow: 0 0 25px var(--gold); z-index: 2; }
        .lantern::after { content: "🏮"; position: absolute; bottom: -12px; font-size: 1.2rem; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5)); }

        /* 互動視窗 (Modal) */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); z-index: 1000; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        .card {
            background: white; color: #333; padding: 30px; border-radius: 20px;
            width: 85%; max-width: 450px; border: 5px solid var(--gold); text-align: center;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
        }

        input { width: 85%; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 1.1rem; outline: none; }
        input:focus { border-color: var(--red); }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-check { background: var(--red); color: white; }
        .btn-hint { background: #f39c12; color: white; }

        #fireworks { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 2000; }
    </style>
</head>
<body>

<canvas id="fireworks"></canvas>

<header>
    <h1 style="color:var(--gold); margin-bottom:5px; letter-spacing: 2px;">🏮 AI 智慧燈謎矩陣 🏮</h1>
    <div id="status" class="status-msg">請輸入 API Key 或等待系統載入...</div>
    <input type="password" id="api-key" placeholder="輸入 Gemini API Key 後按 Enter" style="width:250px; font-size:0.8rem; background:#222; color:#eee; border:1px solid #444; padding:8px;">
</header>

<div class="grid" id="lantern-grid"></div>

<div class="modal" id="modal">
    <div class="card">
        <h2 id="modal-q" style="margin-top:0; color:var(--red);">題目載入中...</h2>
        <p id="modal-hint" style="color:#666; font-weight:bold;"></p>
        <hr style="border:0; border-top:1px solid #eee;">
        <input type="text" id="ans-input" placeholder="請在此輸入謎底...">
        <div id="ai-feedback" style="margin-bottom: 15px; min-height: 24px; font-weight: 600; line-height: 1.4;"></div>
        <div class="btn-group">
            <button class="btn-check" onclick="verifyAnswer()">AI 判定答案</button>
            <div id="fail-options" style="display: none; flex-direction: column; gap: 8px;">
                <button class="btn-hint" onclick="askAiForMoreHint()">AI 給個進階提示</button>
                <button style="background:#8e44ad; color:white;" onclick="giveUp()">不猜了，看答案</button>
            </div>
            <button style="background:#666; color:white;" onclick="closeModal()">返回列表</button>
        </div>
    </div>
</div>

<script>
    // 預留佔位符供 GitHub Actions 注入
    const SECRET_KEY = "__GEMINI_API_KEY__"; 
    let riddles = []; 
    let currentIdx = null;

    // 取得 API Key (同步)
    function getApiKey() {
        const inputKey = document.getElementById('api-key').value.trim();
        return (SECRET_KEY && !SECRET_KEY.startsWith("__")) ? SECRET_KEY : inputKey;
    }

    // 初始化：抓取 12 題
    async function initApp() {
        const status = document.getElementById('status');
        const key = getApiKey();
        
        if(!key) {
            status.innerText = "⚠️ 請輸入 API Key 以利 AI 生成 4x3 謎題";
            return;
        }

        status.innerText = "⏳ AI 正在為您構思 12 個精選燈謎...";

        const prompt = `你是一個專業的燈謎出題官。請隨機生成 12 個中文燈謎。
        請嚴格回傳一個 JSON 陣列，不包含任何 Markdown 代碼塊或解釋文字。
        格式：[{"q": "題目", "a": "答案", "h": "提示"}]`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            
            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            let text = data.candidates[0].content.parts[0].text;
            // 過濾可能的 Markdown 標籤
            text = text.replace(/```json/g, "").replace(/```/g, "").trim();
            riddles = JSON.parse(text); 
            
            status.innerText = "✨ AI 題目準備就緒！請選擇一個燈籠。";
            renderGrid();
        } catch (e) {
            status.innerText = "❌ 錯誤: " + e.message;
            console.error("Init Error:", e);
        }
    }

    function renderGrid() {
        const container = document.getElementById('lantern-grid');
        container.innerHTML = "";
        riddles.forEach((r, i) => {
            const div = document.createElement('div');
            div.className = 'lantern';
            // 縮短燈籠上的文字顯示
            div.innerText = r.q.length > 10 ? r.q.substring(0, 9) + "..." : r.q;
            div.onclick = () => openModal(i);
            container.appendChild(div);
        });
    }

    function openModal(i) {
        currentIdx = i;
        const r = riddles[i];
        document.getElementById('modal-q').innerText = r.q;
        document.getElementById('modal-hint').innerText = "類別：" + r.h;
        document.getElementById('ai-feedback').innerText = "";
        document.getElementById('ans-input').value = "";
        document.getElementById('fail-options').style.display = 'none';
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    async function verifyAnswer() {
        const userAns = document.getElementById('ans-input').value.trim();
        if(!userAns) return;
        
        const feedback = document.getElementById('ai-feedback');
        const key = getApiKey();
        feedback.innerText = "🔍 AI 正在評判中...";

        const prompt = `燈謎題目：「${riddles[currentIdx].q}」，正確答案：「${riddles[currentIdx].a}」。
        使用者回答：「${userAns}」。請判斷是否正確。
        如果意思完全對了，回傳「CORRECT」並加一段恭喜。
        如果錯了，回傳一句幽默的否定話語。`;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            const result = data.candidates[0].content.parts[0].text;

            if(result.toUpperCase().includes("CORRECT")) {
                feedback.innerHTML = `<span style="color:green">🥳 ${result.replace(/CORRECT/gi,"")}</span>`;
                launchFireworks();
            } else {
                feedback.innerHTML = `<span style="color:var(--red)">😅 ${result}</span>`;
                document.getElementById('fail-options').style.display = 'flex';
            }
        } catch (e) { feedback.innerText = "判定時發生連線問題。"; }
    }

    async function askAiForMoreHint() {
        const feedback = document.getElementById('ai-feedback');
        const key = getApiKey();
        feedback.innerText = "💡 AI 正在思考新線索...";
        const prompt = `針對題目「${riddles[currentIdx].q}」，謎底是「${riddles[currentIdx].a}」。請提供一個更明顯但不直接說出答案的線索。`;
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            feedback.innerText = "💡 AI 提示：" + data.candidates[0].content.parts[0].text;
        } catch (e) { feedback.innerText = "無法取得提示。"; }
    }

    function giveUp() {
        alert("這題的答案是： " + riddles[currentIdx].a);
        closeModal();
    }

    // 煙火特效
    function launchFireworks() {
        const cvs = document.getElementById('fireworks');
        const ctx = cvs.getContext('2d');
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        let particles = [];
        for(let i=0; i<100; i++) {
            particles.push({
                x: cvs.width/2, y: cvs.height/3,
                vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15,
                life: 100, color: `hsl(${Math.random()*360}, 100%, 60%)`
            });
        }
        function animate() {
            ctx.clearRect(0,0,cvs.width,cvs.height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 1.5;
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life/100;
                ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
            });
            particles = particles.filter(p => p.life > 0);
            if(particles.length > 0) requestAnimationFrame(animate);
        }
        animate();
    }

    // 監聽 Enter 鍵
    document.getElementById('api-key').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') initApp();
    });

    // 網頁開啟時嘗試自動初始化
    window.onload = () => {
        if(getApiKey()) initApp();
    };
</script>
</body>
</html>
