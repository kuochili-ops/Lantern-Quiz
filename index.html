<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏮 AI 智能燈謎矩陣 🏮</title>
    <style>
        :root { --red: #d32f2f; --gold: #ffd700; }
        body { background: #0a0a0a; color: #fff; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; margin: 0; text-align: center; overflow-x: hidden; }
        
        header { padding: 30px 10px; }
        .status-msg { font-size: 0.9rem; color: var(--gold); margin-bottom: 10px; min-height: 1.2em; }

        /* 4x3 矩陣佈局 */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 15px;
            padding: 10px;
            max-width: 850px;
            margin: auto;
        }

        .lantern {
            background: radial-gradient(circle, #ff4d4d, var(--red));
            aspect-ratio: 1/1.2;
            border: 2px solid var(--gold);
            border-radius: 50% 50% 45% 45%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            font-size: 1rem;
            font-weight: bold;
            line-height: 1.4;
            transition: 0.3s;
            position: relative;
            box-shadow: 0 5px 15px rgba(255,0,0,0.3);
            color: white;
            word-break: break-all;
        }

        .lantern:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--gold); }
        .lantern::after { content: "🏮"; position: absolute; bottom: -12px; font-size: 1.2rem; }

        /* 互動視窗 */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;
        }
        .card {
            background: white; color: #333; padding: 30px; border-radius: 20px;
            width: 85%; max-width: 450px; border: 5px solid var(--gold); text-align: center;
        }

        input { width: 85%; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 1.1rem; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .btn-check { background: var(--red); color: white; }
        .btn-hint { background: #f39c12; color: white; }

        #fireworks { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 2000; }
    </style>
</head>
<body>

<canvas id="fireworks"></canvas>

<header>
    <h1 style="color:var(--gold); margin-bottom:5px;">🏮 AI 智慧燈謎矩陣 🏮</h1>
    <div id="status" class="status-msg">正在連線 Gemini 構思謎題中...</div>
    <input type="password" id="api-key" placeholder="若自動注入失效，請手動貼入 API Key" style="width:250px; font-size:0.8rem; background:#222; color:#eee; border:1px solid #444; padding:5px;">
</header>

<div class="grid" id="lantern-grid"></div>

<div class="modal" id="modal">
    <div class="card">
        <h2 id="modal-q">題目</h2>
        <p id="modal-hint" style="color:var(--red); font-weight:bold;"></p>
        <hr>
        <input type="text" id="ans-input" placeholder="請輸入謎底...">
        <div id="ai-feedback" style="margin-bottom: 15px; min-height: 24px; font-weight: 600;"></div>
        <div class="btn-group">
            <button class="btn-check" onclick="verifyAnswer()">AI 判定答案</button>
            <div id="fail-options" style="display: none; flex-direction: column; gap: 8px;">
                <button class="btn-hint" onclick="askAiForMoreHint()">AI 給個進階提示</button>
                <button style="background:#8e44ad; color:white;" onclick="giveUp()">不猜了，看答案</button>
            </div>
            <button style="background:#666; color:white;" onclick="closeModal()">返回列表</button>
        </div>
    </div>
</div>

<script>
    // 佔位符，供 GitHub Action 注入
    const SECRET_KEY = "__GEMINI_API_KEY__"; 
    let riddles = []; // 宣告全域變數
    let currentIdx = null;

    // 取得 API Key (同步函數，避免 Promise 錯誤)
    function getApiKey() {
        const inputKey = document.getElementById('api-key').value.trim();
        const finalKey = (SECRET_KEY && !SECRET_KEY.startsWith("__")) ? SECRET_KEY : inputKey;
        return finalKey;
    }

    // 初始化：由 AI 抓取 12 題
    async function initApp() {
        const status = document.getElementById('status');
        const key = getApiKey();
        
        if(!key) {
            status.innerText = "⚠️ 請輸入 API Key 以利 AI 生成題目";
            return;
        }

        status.innerText = "正在連線 Gemini 構思謎題中...";

        const prompt = `你是一個專業的燈謎出題官。請隨機生成 12 個中文燈謎。請嚴格回傳 JSON 陣列格式，不要有任何解釋文字。格式範例：[{"q": "題目", "a": "答案", "h": "提示"}]`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            
            const data = await response.json();
            
            if (data.error) {
                status.innerText = "❌ API 錯誤: " + data.error.message;
                return;
            }

            const text = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
            riddles = JSON.parse(text); // 賦值給全域變數
            
            status.innerText = "✨ AI 題目準備就緒！";
            renderGrid();
        } catch (e) {
            status.innerText = "❌ 題目抓取失敗: " + e.message;
            console.error(e);
        }
    }

    // 渲染燈籠
    function renderGrid() {
        const container = document.getElementById('lantern-grid');
        container.innerHTML = "";
        riddles.forEach((r, i) => {
            const div = document.createElement('div');
            div.className = 'lantern';
            div.innerText = r.q.length > 8 ? r.q.substring(0, 7) + "..." : r.q;
            div.onclick = () => openModal(i);
            container.appendChild(div);
        });
    }

    function openModal(i) {
        currentIdx = i;
        const r = riddles[i];
        document.getElementById('modal-q').innerText = r.q;
        document.getElementById('modal-hint').innerText = "類別提示：" + r.h;
        document.getElementById('ai-feedback').innerText = "";
        document.getElementById('ans-input').value = "";
        document.getElementById('fail-options').style.display = 'none';
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    // AI 判定答案
    async function verifyAnswer() {
        const userAns = document.getElementById('ans-input').value;
        const feedback = document.getElementById('ai-feedback');
        const key = getApiKey();

        feedback.innerText = "🔍 AI 正在評判...";
        const prompt = `燈謎題目：「${riddles[currentIdx].q}」，正確答案：「${riddles[currentIdx].a}」。使用者的回答是：「${userAns}」。請判斷是否正確。如果對了，請回傳「CORRECT」加上一段稱讚；如果錯了，請回傳一段幽默的否定。`;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${key}`, {
                method: "POST",
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            const result = data.candidates[0].content.parts[0].text;

            if(result.includes("CORRECT")) {
                feedback.innerHTML = `<span style="color:green">🥳 ${result.replace("CORRECT","")}</span>`;
                launchFireworks();
            } else {
                feedback.innerHTML = `<span style="color:var(--red)">😅 ${result}</span>`;
                document.getElementById('fail-options').style.display = 'flex';
            }
        } catch (e) { feedback.innerText = "判定出錯，請重試。"; }
    }

    async function askAiForMoreHint() {
        const feedback = document.getElementById('ai-feedback');
        const key = getApiKey();
        feedback.innerText = "💡 AI 思考新線索...";
        const prompt = `針對題目「${riddles[currentIdx].q}」，謎底是「${riddles[currentIdx].a}」，請給一個更具體但不直接說破的提示。`;
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${key}`, {
                method: "POST",
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            feedback.innerText = "💡 " + data.candidates[0].content.parts[0].text;
        } catch (e) { feedback.innerText = "無法取得提示。"; }
    }

    function giveUp() {
        alert("這題的答案是： " + riddles[currentIdx].a);
        closeModal();
    }

    function launchFireworks() {
        const cvs = document.getElementById('fireworks');
        const ctx = cvs.getContext('2d');
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        let particles = [];
        for(let i=0; i<80; i++) {
            particles.push({
                x: cvs.width/2, y: cvs.height/3,
                vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12,
                life: 100, color: `hsl(${Math.random()*360}, 100%, 60%)`
            });
        }
        function animate() {
            ctx.clearRect(0,0,cvs.width,cvs.height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life/100;
                ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
            });
            particles = particles.filter(p => p.life > 0);
            if(particles.length > 0) requestAnimationFrame(animate);
        }
        animate();
    }

    // 監聽 API Key 輸入完成後觸發初始化
    document.getElementById('api-key').addEventListener('change', () => { 
        if(riddles.length === 0) initApp(); 
    });

    // 初始嘗試載入 (若 Secret 已注入)
    window.onload = () => {
        if(getApiKey()) initApp();
    };
</script>
</body>
</html>
