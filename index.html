<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏮 AI 智慧燈謎矩陣 - 修正版</title>
    <style>
        :root { --red: #d32f2f; --gold: #ffd700; --dark: #0a0a0a; }
        body { background: var(--dark); color: #fff; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; margin: 0; text-align: center; }
        header { padding: 30px 10px; }
        .status-msg { font-size: 0.9rem; color: var(--gold); margin-bottom: 10px; min-height: 1.2em; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 10px; max-width: 800px; margin: auto; }
        .lantern {
            background: radial-gradient(circle, #ff4d4d, var(--red)); aspect-ratio: 1/1.2;
            border: 2px solid var(--gold); border-radius: 50% 50% 45% 45%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; padding: 10px;
            font-size: 1rem; font-weight: bold; transition: 0.3s; color: white;
            box-shadow: 0 5px 15px rgba(255,0,0,0.3);
        }
        .lantern:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--gold); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 1000; justify-content: center; align-items: center; }
        .card { background: white; color: #333; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; border: 5px solid var(--gold); text-align: center; }
        input { width: 80%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; }
        button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.2s; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<header>
    <h1 style="color:var(--gold);">🏮 AI 智慧燈謎矩陣 🏮</h1>
    <div id="status" class="status-msg">請貼入 API Key 並按 Enter 載入</div>
    <input type="password" id="api-key" placeholder="貼入 API Key 後按 Enter" style="width:250px; background:#222; color:#eee; border:1px solid #444; padding:8px;">
</header>

<div class="grid" id="lantern-grid"></div>

<div class="modal" id="modal">
    <div class="card">
        <h2 id="modal-q">題目載入中...</h2>
        <input type="text" id="ans-input" placeholder="請輸入謎底...">
        <div id="ai-feedback" style="margin: 15px 0; font-weight: bold; min-height: 1.5em;"></div>
        <button style="background:var(--red); color:white;" onclick="verifyAnswer()">判定答案</button>
        <button style="background:#666; color:white;" onclick="closeModal()">返回列表</button>
    </div>
</div>

<script>
    const SECRET_KEY = "__GEMINI_API_KEY__"; 
    let riddles = [];
    let currentIdx = null;

    // 使用穩定版 v1
    const API_URL = "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent";

    function getApiKey() {
        const inputKey = document.getElementById('api-key').value.trim();
        return (SECRET_KEY && !SECRET_KEY.startsWith("__")) ? SECRET_KEY : inputKey;
    }

    // 核心呼叫函數：採用標準化 Body 結構
    async function callAI(text) {
        const key = getApiKey();
        if(!key) return null;

        const payload = {
            contents: [{
                parts: [{ text: text }]
            }],
            generationConfig: {
                temperature: 0.7,
                maxOutputTokens: 1024
            }
        };

        try {
            const response = await fetch(`${API_URL}?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (!response.ok) {
                // 如果報錯，把細節顯示在 status 方便除錯
                const errorMsg = data.error ? data.error.message : "未知錯誤";
                throw new Error(errorMsg);
            }

            return data.candidates[0].content.parts[0].text;
        } catch (e) {
            document.getElementById('status').innerText = "❌ API 報錯: " + e.message;
            console.error("Detailed Error:", e);
            return null;
        }
    }

    async function initApp() {
        const status = document.getElementById('status');
        status.innerText = "⏳ AI 正在精心出題中...";
        
        const prompt = "你是一個專業出題官。請隨機生成 12 個中文燈謎。請嚴格以 JSON 陣列格式回傳，不要有任何前言或 Markdown 標籤。格式範例: [{\"q\":\"題目\",\"a\":\"答案\",\"h\":\"提示\"}]";
        
        const result = await callAI(prompt);
        if(result) {
            try {
                // 清理可能的 Markdown 語法
                const cleanJson = result.replace(/```json/g, "").replace(/```/g, "").trim();
                riddles = JSON.parse(cleanJson);
                status.innerText = "✨ 燈謎載入成功！請點擊燈籠。";
                renderGrid();
            } catch(e) {
                status.innerText = "❌ 解析失敗，請按 Enter 重試";
                console.log("AI 回傳原始內容:", result);
            }
        }
    }

    function renderGrid() {
        const container = document.getElementById('lantern-grid');
        container.innerHTML = "";
        riddles.forEach((r, i) => {
            const div = document.createElement('div');
            div.className = 'lantern';
            div.innerText = r.q.length > 8 ? r.q.substring(0, 7) + "..." : r.q;
            div.onclick = () => {
                currentIdx = i;
                document.getElementById('modal-q').innerText = r.q;
                document.getElementById('ai-feedback').innerText = "";
                document.getElementById('ans-input').value = "";
                document.getElementById('modal').style.display = 'flex';
            };
            container.appendChild(div);
        });
    }

    async function verifyAnswer() {
        const userAns = document.getElementById('ans-input').value.trim();
        if(!userAns) return;
        
        const feedback = document.getElementById('ai-feedback');
        feedback.innerText = "🔍 AI 判定中...";
        
        const prompt = `題目：${riddles[currentIdx].q}，正確答案：${riddles[currentIdx].a}。使用者答：${userAns}。請判斷對錯。若對請說「正確」並稱讚；若錯請給幽默提示。`;
        
        const result = await callAI(prompt);
        if(result) {
            feedback.innerText = result;
            feedback.style.color = result.includes("正確") ? "green" : "#d32f2f";
        }
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    // 監聽 Enter
    document.getElementById('api-key').addEventListener('keypress', e => {
        if(e.key === 'Enter') initApp();
    });

    // 初始載入
    window.onload = () => {
        if(getApiKey()) initApp();
    };
</script>
</body>
</html>
