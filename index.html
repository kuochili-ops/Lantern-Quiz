<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏮 AI 智慧燈謎 - 穩定版 🏮</title>
    <style>
        :root { --red: #d32f2f; --gold: #ffd700; --dark: #0a0a0a; }
        body { background: var(--dark); color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        header { padding: 30px 10px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px; max-width: 800px; margin: auto; }
        .lantern {
            background: radial-gradient(circle, #ff4d4d, var(--red)); aspect-ratio: 1/1.2;
            border: 2px solid var(--gold); border-radius: 50% 50% 45% 45%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; padding: 10px;
            font-size: 0.9rem; font-weight: bold; transition: 0.3s; color: white;
        }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .card { background: white; color: #333; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; border: 5px solid var(--gold); }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; }
    </style>
</head>
<body>
<header>
    <h1 style="color:var(--gold);">🏮 AI 智慧燈謎 🏮</h1>
    <div id="status" style="color:var(--gold); margin-bottom:10px;">請貼入 API Key 並按 Enter</div>
    <input type="password" id="api-key" placeholder="貼入 API Key" style="width:200px; background:#222; color:#eee; border:1px solid #444; padding:5px;">
</header>
<div class="grid" id="lantern-grid"></div>
<div class="modal" id="modal">
    <div class="card">
        <h2 id="modal-q">題目</h2>
        <input type="text" id="ans-input" placeholder="輸入答案...">
        <div id="ai-feedback" style="margin: 10px 0; font-weight: bold;"></div>
        <button style="background:var(--red); color:white;" onclick="verifyAnswer()">判定</button>
        <button style="background:#666; color:white;" onclick="closeModal()">關閉</button>
    </div>
</div>

<script>
    const SECRET_KEY = "AIzaSyAxr8-fPdJZKw6IlEbcqvtEIwGKrBskkd0"; 
    let riddles = [];
    let currentIdx = null;

    // 💡 關鍵：改用 v1 穩定路徑並鎖定 1.5-flash
    const API_URL = "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent";

    function getApiKey() {
        const inputKey = document.getElementById('api-key').value.trim();
        return (SECRET_KEY && !SECRET_KEY.startsWith("__")) ? SECRET_KEY : inputKey;
    }

    async function callAI(promptText) {
        const key = getApiKey();
        if(!key) return null;

        try {
            const response = await fetch(`${API_URL}?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: promptText }] }]
                })
            });

            const data = await response.json();
            if (!response.ok) {
                console.error("API Error Data:", data);
                throw new Error(data.error ? data.error.message : "未知錯誤");
            }
            return data.candidates[0].content.parts[0].text;
        } catch (e) {
            document.getElementById('status').innerText = "❌ 錯誤: " + e.message;
            return null;
        }
    }

    async function initApp() {
        const status = document.getElementById('status');
        status.innerText = "⏳ AI 正在思考 12 個燈謎...";
        
        const prompt = "你是一個燈謎專家。請提供12個燈謎，並以 JSON 陣列格式輸出。每個物件包含 q (題目), a (答案), h (提示)。請直接輸出 JSON，不要包含 Markdown 或額外文字。範例格式: [{\"q\":\"題目\",\"a\":\"答案\",\"h\":\"提示\"}]";
        const result = await callAI(prompt);
        
        if(result) {
            try {
                // 強制清理可能出現的 Markdown 標籤
                const cleanJson = result.replace(/```json/g, "").replace(/```/g, "").trim();
                riddles = JSON.parse(cleanJson);
                status.innerText = "✨ 燈謎載入成功！";
                renderGrid();
            } catch(e) { 
                status.innerText = "❌ JSON 解析失敗，請按 Enter 重試"; 
                console.error("Parse Error:", result);
            }
        }
    }

    function renderGrid() {
        const container = document.getElementById('lantern-grid');
        container.innerHTML = "";
        riddles.forEach((r, i) => {
            const div = document.createElement('div');
            div.className = 'lantern';
            div.innerText = r.q.length > 8 ? r.q.substring(0, 7) + "..." : r.q;
            div.onclick = () => {
                currentIdx = i;
                document.getElementById('modal-q').innerText = r.q;
                document.getElementById('ai-feedback').innerText = "";
                document.getElementById('ans-input').value = "";
                document.getElementById('modal').style.display = 'flex';
            };
            container.appendChild(div);
        });
    }

    async function verifyAnswer() {
        const userAns = document.getElementById('ans-input').value;
        const feedback = document.getElementById('ai-feedback');
        feedback.innerText = "AI 判定中...";
        const prompt = `題目：${riddles[currentIdx].q}，答案：${riddles[currentIdx].a}。使用者回答：${userAns}。請回傳：答對回 CORRECT 加上鼓勵，答錯則給予幽默提醒。`;
        const result = await callAI(prompt);
        feedback.innerText = result ? result.replace("CORRECT", "🥳 正確！") : "😅 再試試看！";
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    document.getElementById('api-key').addEventListener('keypress', e => { if(e.key === 'Enter') initApp(); });
    window.onload = () => { if(getApiKey()) initApp(); };
</script>
</body>
</html>
