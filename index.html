<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏮 AI 智慧燈謎 - 最終修正版</title>
    <style>
        :root { --red: #d32f2f; --gold: #ffd700; --dark: #0a0a0a; }
        body { background: var(--dark); color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        header { padding: 30px 10px; }
        .status-msg { font-size: 0.9rem; color: var(--gold); margin-bottom: 10px; min-height: 1.2em; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 10px; max-width: 800px; margin: auto; }
        .lantern {
            background: radial-gradient(circle, #ff4d4d, var(--red)); aspect-ratio: 1/1.2;
            border: 2px solid var(--gold); border-radius: 50% 50% 45% 45%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; padding: 10px;
            font-size: 1rem; font-weight: bold; transition: 0.3s; color: white;
            box-shadow: 0 5px 15px rgba(255,0,0,0.3);
        }
        .lantern:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--gold); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 1000; justify-content: center; align-items: center; }
        .card { background: white; color: #333; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; border: 5px solid var(--gold); }
        input { width: 80%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; }
        button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; }
    </style>
</head>
<body>

<header>
    <h1 style="color:var(--gold);">🏮 AI 智慧燈謎 🏮</h1>
    <div id="status" class="status-msg">請貼入 API Key 後按 Enter</div>
    <input type="password" id="api-key" placeholder="貼入 API Key" style="width:250px; background:#222; color:#eee; border:1px solid #444; padding:8px;">
</header>

<div class="grid" id="lantern-grid"></div>

<div class="modal" id="modal">
    <div class="card">
        <h2 id="modal-q">題目</h2>
        <input type="text" id="ans-input" placeholder="請輸入謎底...">
        <div id="ai-feedback" style="margin: 15px 0; font-weight: bold; min-height: 1.5em;"></div>
        <button style="background:var(--red); color:white;" onclick="verifyAnswer()">判定答案</button>
        <button style="background:#666; color:white;" onclick="closeModal()">返回列表</button>
    </div>
</div>

<script>
    const SECRET_KEY = "AIzaSyCL65TG8WRphIVwSnhr-Kbszzm2vV0WMXU"; 
    let riddles = [];
    let currentIdx = null;

    // 💡 關鍵修正：回到 v1beta，這是目前支援 gemini-1.5-flash 的路徑
    const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent";

    function getApiKey() {
        const inputKey = document.getElementById('api-key').value.trim();
        return (SECRET_KEY && !SECRET_KEY.startsWith("__")) ? SECRET_KEY : inputKey;
    }

    async function callAI(text) {
        const key = getApiKey();
        if(!key) return null;

        // 確保 Payload 結構符合 v1beta 要求
        const payload = {
            contents: [{
                parts: [{ text: text }]
            }]
        };

        try {
            const response = await fetch(`${API_URL}?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error ? data.error.message : "API 錯誤");
            }

            return data.candidates[0].content.parts[0].text;
        } catch (e) {
            document.getElementById('status').innerText = "❌ 報錯: " + e.message;
            console.error("Debug Info:", e);
            return null;
        }
    }

    async function initApp() {
        const status = document.getElementById('status');
        status.innerText = "⏳ AI 正在思考燈謎...";
        
        const prompt = "請隨機生成 12 個中文燈謎。請嚴格以 JSON 陣列格式回傳：[{\"q\":\"題目\",\"a\":\"答案\",\"h\":\"提示\"}]。不要任何前言或 Markdown。";
        
        const result = await callAI(prompt);
        if(result) {
            try {
                const cleanJson = result.replace(/```json/g, "").replace(/```/g, "").trim();
                riddles = JSON.parse(cleanJson);
                status.innerText = "✨ 載入成功！請點擊燈籠。";
                renderGrid();
            } catch(e) {
                status.innerText = "❌ 解析失敗，請重試";
            }
        }
    }

    function renderGrid() {
        const container = document.getElementById('lantern-grid');
        container.innerHTML = "";
        riddles.forEach((r, i) => {
            const div = document.createElement('div');
            div.className = 'lantern';
            div.innerText = r.q.length > 8 ? r.q.substring(0, 7) + "..." : r.q;
            div.onclick = () => {
                currentIdx = i;
                document.getElementById('modal-q').innerText = r.q;
                document.getElementById('ai-feedback').innerText = "";
                document.getElementById('ans-input').value = "";
                document.getElementById('modal').style.display = 'flex';
            };
            container.appendChild(div);
        });
    }

    async function verifyAnswer() {
        const userAns = document.getElementById('ans-input').value.trim();
        if(!userAns) return;
        const feedback = document.getElementById('ai-feedback');
        feedback.innerText = "🔍 評判中...";
        const prompt = `題目：${riddles[currentIdx].q}，答案：${riddles[currentIdx].a}。使用者答：${userAns}。請判斷對錯。若對請說「正確」；若錯請給幽默提示。`;
        const result = await callAI(prompt);
        if(result) {
            feedback.innerText = result;
            feedback.style.color = result.includes("正確") ? "green" : "#d32f2f";
        }
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    document.getElementById('api-key').addEventListener('keypress', e => { if(e.key === 'Enter') initApp(); });
    window.onload = () => { if(getApiKey()) initApp(); };
</script>
</body>
</html>
