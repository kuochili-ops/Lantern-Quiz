<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏮 AI 智慧燈謎 - 最終校正版</title>
    <style>
        :root { --red: #e63946; --gold: #ffb703; --dark: #0d1117; }
        body { background: var(--dark); color: #c9d1d9; font-family: sans-serif; text-align: center; margin: 0; }
        header { padding: 50px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; padding: 20px; max-width: 900px; margin: auto; }
        .lantern { background: #ff4d4d; aspect-ratio: 1/1.2; border: 2px solid var(--gold); border-radius: 40% 40% 30% 30%; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 10px; font-weight: bold; color: white; animation: sway 3s infinite ease-in-out; transform-origin: top center; }
        @keyframes sway { 0%, 100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .card { background: white; color: #222; padding: 30px; border-radius: 20px; width: 80%; max-width: 350px; border: 5px solid var(--gold); }
        .btn { padding: 10px; width: 100%; background: var(--red); color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1 style="color:var(--gold);">🏮 AI 智慧燈謎 🏮</h1>
    <div id="status" style="margin-top:20px; color:#8b949e;">📡 正在嘗試連線至 GitHub Copilot...</div>
</header>

<div class="grid" id="main-grid"></div>

<div class="modal" id="modal">
    <div class="card">
        <h3 id="q-title"></h3>
        <input type="text" id="user-input" placeholder="謎底是？" style="width:90%; padding:10px; margin:10px 0; text-align:center;">
        <div id="feedback" style="margin: 10px; font-weight: bold;"></div>
        <button class="btn" onclick="checkAns()">送出</button>
        <button class="btn" onclick="closeModal()" style="background:#ccc; color:#333;">關閉</button>
    </div>
</div>

<script>
    // 💡 請在此處貼上你在 Console 產生的 Base64 亂碼
    const ENCODED_TOKEN = "Z2l0aHViX3BhdF8xMUIyQUdCTVEwQ2tZQnJnU0R6bENqX1dWN1JpUTc1dlAyaXhhRURlQnVodDE5RlV4OGpHbWh1OEpwS01qaHgxbTRFUkRNNFhSR0tSWnVLQmVV"; 

    let riddles = [];
    let cur = null;

    async function askAI(msgs, jsonMode = false) {
        let rawToken = "";
        try {
            rawToken = atob(ENCODED_TOKEN).trim(); // 解碼並去空白
        } catch (e) {
            document.getElementById('status').innerText = "❌ Base64 解碼失敗，請重新產生編碼。";
            return null;
        }

        try {
            const res = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json", 
                    "Authorization": `Bearer ${rawToken}` 
                },
                body: JSON.stringify({
                    model: "gpt-4o",
                    messages: msgs,
                    response_format: jsonMode ? { type: "json_object" } : undefined
                })
            });

            const data = await res.json();
            if (!res.ok) {
                console.error("API 錯誤內容:", data);
                document.getElementById('status').innerText = `❌ API 拒絕連線: ${data.error?.message || '原因不明'}`;
                return null;
            }
            return data.choices[0].message.content;
        } catch (e) {
            document.getElementById('status').innerText = "❌ 網路問題，請檢查是否被防火牆或 CORS 攔截。";
            return null;
        }
    }

    async function init() {
        if(ENCODED_TOKEN === "你的Base64編碼貼在這裡") {
            document.getElementById('status').innerText = "⚠️ 請在程式碼中填入 ENCODED_TOKEN！";
            return;
        }

        const raw = await askAI([
            {role: "system", content: "你是一個燈謎官。請回傳 JSON: {\"list\": [{\"q\":\"題目\",\"a\":\"答案\"}]}"},
            {role: "user", content: "請給我 12 個中文燈謎"}
        ], true);
        
        if (raw) {
            riddles = JSON.parse(raw).list;
            document.getElementById('status').innerText = "✅ 點亮成功！點擊燈籠挑戰。";
            const g = document.getElementById('main-grid');
            g.innerHTML = "";
            riddles.forEach((r, i) => {
                const d = document.createElement('div');
                d.className = 'lantern';
                d.innerText = r.q.substring(0, 8) + "...";
                d.onclick = () => {
                    cur = i;
                    document.getElementById('q-title').innerText = r.q;
                    document.getElementById('feedback').innerText = "";
                    document.getElementById('user-input').value = "";
                    document.getElementById('modal').style.display = 'flex';
                };
                g.appendChild(d);
            });
        }
    }

    async function checkAns() {
        const ans = document.getElementById('user-input').value;
        const fb = document.getElementById('feedback');
        fb.innerText = "🔍 評判中...";
        const raw = await askAI([
            {role: "system", content: "判斷對錯並用中文回覆。JSON: {\"ok\":true/false, \"msg\":\"內容\"}"},
            {role: "user", content: `題:${riddles[cur].q}, 正確:${riddles[cur].a}, 使用者:${ans}`}
        ], true);
        if (raw) {
            const res = JSON.parse(raw);
            fb.innerText = (res.ok ? "🟢 " : "🔴 ") + res.msg;
            fb.style.color = res.ok ? "green" : "red";
        }
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    window.onload = init;
</script>
</body>
</html>
