<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏮 AI 智慧燈謎 - 最終穩定版</title>
    <style>
        :root { --red: #d32f2f; --gold: #ffd700; --dark: #0a0a0a; }
        body { background: var(--dark); color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        header { padding: 30px 10px; }
        .status-msg { font-size: 0.9rem; color: var(--gold); margin-bottom: 10px; padding: 0 20px; word-break: break-all; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px; max-width: 800px; margin: auto; }
        .lantern {
            background: radial-gradient(circle, #ff4d4d, var(--red)); aspect-ratio: 1/1.2;
            border: 2px solid var(--gold); border-radius: 50% 50% 45% 45%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; padding: 8px;
            font-size: 0.9rem; font-weight: bold; transition: 0.3s; color: white;
            box-shadow: 0 5px 15px rgba(255,0,0,0.3);
        }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .card { background: white; color: #333; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; border: 5px solid var(--gold); }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; }
    </style>
</head>
<body>

<header>
    <h1 style="color:var(--gold);">🏮 AI 智慧燈謎 🏮</h1>
    <div id="status" class="status-msg">請貼入 API Key 並按 Enter</div>
    <input type="password" id="api-key" placeholder="貼入 API Key" style="width:200px; background:#222; color:#eee; border:1px solid #444; padding:5px;">
</header>

<div class="grid" id="lantern-grid"></div>

<div class="modal" id="modal">
    <div class="card">
        <h2 id="modal-q">題目</h2>
        <input type="text" id="ans-input" placeholder="謎底是...">
        <div id="ai-feedback" style="margin: 10px 0; font-weight: bold; min-height: 1.5em;"></div>
        <button style="background:var(--red); color:white;" onclick="verifyAnswer()">判定</button>
        <button style="background:#666; color:white;" onclick="closeModal()">關閉</button>
    </div>
</div>

<script>
    const SECRET_KEY = "AIzaSyCL65TG8WRphIVwSnhr-Kbszzm2vV0WMXU"; 
    let riddles = [];
    let currentIdx = null;

    // 💡 嘗試使用最通用的 -latest 路徑
    const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent";

    function getApiKey() {
        const inputKey = document.getElementById('api-key').value.trim();
        return (SECRET_KEY && !SECRET_KEY.startsWith("__")) ? SECRET_KEY : inputKey;
    }

    async function callAI(text) {
        const key = getApiKey();
        if(!key) return null;

        try {
            const response = await fetch(`${API_URL}?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }]
                })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error ? data.error.message : "API 錯誤");
            return data.candidates[0].content.parts[0].text;
        } catch (e) {
            document.getElementById('status').innerText = "❌ 報錯: " + e.message;
            return null;
        }
    }

    async function initApp() {
        const status = document.getElementById('status');
        status.innerText = "⏳ AI 出題中...";
        
        const prompt = "請生成 12 個中文燈謎 JSON: [{\"q\":\"題\",\"a\":\"答\",\"h\":\"提示\"}]。不要解釋文字。";
        const result = await callAI(prompt);
        
        if(result) {
            try {
                const cleanJson = result.replace(/```json/g, "").replace(/```/g, "").trim();
                riddles = JSON.parse(cleanJson);
                status.innerText = "✨ 載入成功！";
                renderGrid();
            } catch(e) { status.innerText = "❌ 解析失敗"; }
        }
    }

    function renderGrid() {
        const container = document.getElementById('lantern-grid');
        container.innerHTML = "";
        riddles.forEach((r, i) => {
            const div = document.createElement('div');
            div.className = 'lantern';
            div.innerText = r.q.substring(0, 8);
            div.onclick = () => {
                currentIdx = i;
                document.getElementById('modal-q').innerText = r.q;
                document.getElementById('ai-feedback').innerText = "";
                document.getElementById('modal').style.display = 'flex';
            };
            container.appendChild(div);
        });
    }

    async function verifyAnswer() {
        const userAns = document.getElementById('ans-input').value;
        const feedback = document.getElementById('ai-feedback');
        feedback.innerText = "🔍 判定中...";
        const prompt = `題目：${riddles[currentIdx].q}，正確答案：${riddles[currentIdx].a}。回答：${userAns}。對了回CORRECT加稱讚，錯了幽默吐槽。`;
        const result = await callAI(prompt);
        feedback.innerText = result ? result.replace("CORRECT", "🥳") : "再試試！";
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    document.getElementById('api-key').addEventListener('keypress', e => { if(e.key === 'Enter') initApp(); });
    window.onload = () => { if(getApiKey()) initApp(); };
</script>
</body>
</html>
